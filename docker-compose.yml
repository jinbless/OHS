version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ohs-backend
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALLOWED_ORIGINS=["http://localhost","http://localhost:80","https://${DOMAIN}","https://www.${DOMAIN}"]
      - DATABASE_URL=postgresql://kosha:1229@host.docker.internal/kosha
      - OHS_BASE_DIR=${OHS_BASE_DIR:-/home/blessjin/cashtoss/ohs}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_data:/app/data
      - ./guide:${OHS_BASE_DIR:-/home/blessjin/cashtoss/ohs}/guide:ro
      - chromadb_data:${OHS_BASE_DIR:-/home/blessjin/cashtoss/ohs}/backend/data/chromadb
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - ohs-network
      - kosha-shared

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: ohs-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - ohs-network

networks:
  ohs-network:
    driver: bridge
  kosha-shared:
    external: true

volumes:
  backend_data:
  chromadb_data:
